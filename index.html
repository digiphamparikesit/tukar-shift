<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Pengajuan Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --green-900:#0B3D2A;
    --green-800:#0F4D34;
    --green-700:#146C43;
    --green-600:#1E8455;
    --green-500:#2F9E63;
    --green-100:#E3F1E8;
    --green-050:#F2F7F3;
    --paper:#F6F7F2;
    --ink:#16241C;
    --muted:#5C6B61;
    --border:#D7E3D9;
    --danger:#B3261E;
    --danger-bg:#FBEAE9;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    line-height:1.5;
    padding:40px 16px 80px;
  }
  .wrap{max-width:640px;margin:0 auto;transition:max-width .2s;}
  .wrap.wide{max-width:960px;}
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:28px;
  }
  .brand svg{flex-shrink:0;}
  .brand h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:22px;
    margin:0;
    color:var(--green-900);
    letter-spacing:-0.01em;
  }
  .brand p{
    margin:2px 0 0;
    font-size:13px;
    color:var(--muted);
  }
  .card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:16px;
    padding:28px;
    margin-bottom:20px;
  }
  .section-label{
    font-size:11px;
    font-weight:600;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--green-700);
    margin:0 0 14px;
  }
  .field{margin-bottom:16px;}
  .field:last-child{margin-bottom:0;}
  label{
    display:block;
    font-size:13px;
    font-weight:500;
    color:var(--ink);
    margin-bottom:6px;
  }
  label .opt{color:var(--muted);font-weight:400;}
  input[type=text], input[type=date], input[type=time], textarea, select{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--border);
    border-radius:8px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--ink);
    background:#fff;
    transition:border-color .15s;
  }
  input:focus, textarea:focus, select:focus{
    outline:none;
    border-color:var(--green-600);
    box-shadow:0 0 0 3px var(--green-100);
  }
  textarea{resize:vertical;min-height:80px;}
  .nip-row{display:flex;gap:8px;}
  .nip-row input{font-family:'IBM Plex Mono',monospace;}
  .btn-check{
    flex-shrink:0;
    background:var(--green-700);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:0 18px;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    transition:background .15s;
  }
  .btn-check:hover{background:var(--green-800);}
  .btn-check:disabled{background:var(--border);cursor:not-allowed;}
  .staff-preview{
    margin-top:12px;
    padding:12px 14px;
    background:var(--green-050);
    border:1px solid var(--green-100);
    border-radius:8px;
    font-size:13px;
    display:none;
  }
  .staff-preview.show{display:block;}
  .staff-preview div{margin-bottom:2px;}
  .staff-preview strong{color:var(--green-900);}
  .staff-preview.error{
    background:var(--danger-bg);
    border-color:#F3C7C4;
    color:var(--danger);
  }
  .chips{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(130px,1fr));
    gap:8px;
  }
  .chip{
    display:flex;
    align-items:center;
    gap:8px;
    padding:11px 12px;
    border:1px solid var(--border);
    border-radius:10px;
    background:#fff;
    cursor:pointer;
    font-size:13px;
    font-weight:500;
    color:var(--ink);
    transition:border-color .15s, background .15s, color .15s;
  }
  .chip svg{flex-shrink:0;stroke:var(--muted);transition:stroke .15s;}
  .chip:hover{border-color:var(--green-500);}
  .chip.active{
    background:var(--green-700);
    border-color:var(--green-700);
    color:#fff;
  }
  .chip.active svg{stroke:#fff;}

  /* ==== WARNA PER JENIS FORMULIR ==== */
  .chip[data-jenis="izin"]{background:#EAF1FE;border-color:#CBDCFB;}
  .chip[data-jenis="izin"] svg{stroke:#2F6FED;}
  .chip[data-jenis="izin"].active{background:#2F6FED;border-color:#2F6FED;}

  .chip[data-jenis="sakit"]{background:#FCE7F3;border-color:#F6C6E0;}
  .chip[data-jenis="sakit"] svg{stroke:#DB2777;}
  .chip[data-jenis="sakit"].active{background:#DB2777;border-color:#DB2777;}

  .chip[data-jenis="tukarshift"]{background:#EDE9FE;border-color:#D6CCFB;}
  .chip[data-jenis="tukarshift"] svg{stroke:#7C3AED;}
  .chip[data-jenis="tukarshift"].active{background:#7C3AED;border-color:#7C3AED;}

  .chip[data-jenis="cuti"]{background:#FEF3C7;border-color:#FBE39A;}
  .chip[data-jenis="cuti"] svg{stroke:#D97706;}
  .chip[data-jenis="cuti"].active{background:#D97706;border-color:#D97706;}

  .chip[data-jenis="telat"]{background:#CFFAFE;border-color:#A5F0F7;}
  .chip[data-jenis="telat"] svg{stroke:#0891B2;}
  .chip[data-jenis="telat"].active{background:#0891B2;border-color:#0891B2;}

  .chip[data-jenis="absensieror"]{background:#FEE2E2;border-color:#FBC7C4;}
  .chip[data-jenis="absensieror"] svg{stroke:#DC2626;}
  .chip[data-jenis="absensieror"].active{background:#DC2626;border-color:#DC2626;}

  /* Aksen warna pada kartu detail, mengikuti jenis formulir yang aktif */
  #dynamicCard{border-left-width:4px;transition:border-color .15s, background .15s;}
  #dynamicCard[data-jenis="izin"]{border-left-color:#2F6FED;background:#F8FAFF;}
  #dynamicCard[data-jenis="izin"] #dynamicLabel{color:#2F6FED;}
  #dynamicCard[data-jenis="sakit"]{border-left-color:#DB2777;background:#FEF8FB;}
  #dynamicCard[data-jenis="sakit"] #dynamicLabel{color:#DB2777;}
  #dynamicCard[data-jenis="tukarshift"]{border-left-color:#7C3AED;background:#FBFAFF;}
  #dynamicCard[data-jenis="tukarshift"] #dynamicLabel{color:#7C3AED;}
  #dynamicCard[data-jenis="cuti"]{border-left-color:#D97706;background:#FFFCF5;}
  #dynamicCard[data-jenis="cuti"] #dynamicLabel{color:#D97706;}
  #dynamicCard[data-jenis="telat"]{border-left-color:#0891B2;background:#F5FDFE;}
  #dynamicCard[data-jenis="telat"] #dynamicLabel{color:#0891B2;}
  #dynamicCard[data-jenis="absensieror"]{border-left-color:#DC2626;background:#FFFAFA;}
  #dynamicCard[data-jenis="absensieror"] #dynamicLabel{color:#DC2626;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .radio-group{display:flex;gap:16px;padding-top:2px;}
  .radio-opt{display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;}
  .radio-opt input{width:auto;}
  .submit-btn{
    width:100%;
    padding:14px;
    background:var(--green-700);
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    font-family:'Inter',sans-serif;
    cursor:pointer;
    transition:background .15s;
  }
  .submit-btn:hover{background:var(--green-800);}
  .submit-btn:disabled{background:var(--border);cursor:not-allowed;}
  .banner{
    padding:12px 14px;
    border-radius:8px;
    font-size:13px;
    margin-top:14px;
    display:none;
  }
  .banner.show{display:block;}
  .banner.success{background:var(--green-100);color:var(--green-900);border:1px solid var(--green-500);}
  .banner.error{background:var(--danger-bg);color:var(--danger);border:1px solid #F3C7C4;}
  .empty-hint{font-size:13px;color:var(--muted);padding:8px 0;}

  .col-group{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:24px;
  }
  .col-group .col-title{
    font-size:11px;
    font-weight:600;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 12px;
    padding-bottom:8px;
    border-bottom:1px solid var(--border);
  }
  @media (max-width:720px){
    .col-group{grid-template-columns:1fr;}
    .col-group > div:not(:last-child){
      padding-bottom:16px;
      margin-bottom:16px;
      border-bottom:1px dashed var(--border);
    }
  }
  @media (max-width:480px){
    .row2{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
      <circle cx="17" cy="17" r="17" fill="#0F4D34"/>
      <path d="M10 20c0-6 4-10 10-10 0 6-4 10-10 10z" fill="#2F9E63"/>
      <path d="M10 20V24" stroke="#E3F1E8" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div>
      <h1>Portal pengajuan staff</h1>
      <p>Ajukan izin, sakit, tukar shift, cuti, keterlambatan, atau absensi eror</p>
    </div>
  </div>

  <form id="mainForm">

    <div class="card">
      <p class="section-label">Identitas staff</p>
      <div class="field">
        <label for="staffSearch">Cari nama staff</label>
        <input type="text" id="staffSearch" list="staffOptions" placeholder="Ketik beberapa huruf nama..." autocomplete="off" required>
        <datalist id="staffOptions"></datalist>
        <div class="staff-preview" id="staffPreview"></div>
      </div>
    </div>

    <div class="card">
      <p class="section-label">Jenis formulir</p>
      <div class="chips" id="jenisChips">
        <div class="chip" data-jenis="izin">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/></svg>
          Izin
        </div>
        <div class="chip" data-jenis="sakit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.5-1.5 3-3.2 3-5.5A5.5 5.5 0 0 0 12 6a5.5 5.5 0 0 0-10 2.5C2 12 9 18 12 20c1-.6 2-1.4 3-2.2"/></svg>
          Sakit
        </div>
        <div class="chip" data-jenis="tukarshift">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          Tukar shift
        </div>
        <div class="chip" data-jenis="cuti">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          Cuti tahunan
        </div>
        <div class="chip" data-jenis="telat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
          Telat/pulang cepat
        </div>
        <div class="chip" data-jenis="absensieror">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
          Absensi eror
        </div>
      </div>
    </div>

    <div class="card" id="dynamicCard" style="display:none;">
      <p class="section-label" id="dynamicLabel">Detail pengajuan</p>
      <div id="dynamicFields"></div>
    </div>

    <div class="card" style="display:none;" id="emptyCard">
      <p class="empty-hint">Pilih jenis formulir di atas untuk melanjutkan.</p>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">Kirim pengajuan</button>
    <div class="banner" id="banner"></div>
  </form>

</div>

<script>
// ==== KONFIGURASI ====
// Ganti dengan URL Web App Google Apps Script yang sudah di-deploy
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFoa5--tqPOorgaXOz-TO27_SZR-wXndNR9oPDgc1NLjoVwKOQGBw4MmRM4sYmZ95Gpw/exec";

// ==== DEFINISI FIELD PER JENIS FORMULIR ====
const formConfigs = {
  izin: {
    label: "Detail izin",
    fields: [
      { id: "tanggalMulai", label: "Tanggal mulai", type: "date", required: true },
      { id: "tanggalSelesai", label: "Tanggal selesai", type: "date", required: true },
      { id: "keterangan", label: "Alasan izin", type: "textarea", required: true }
    ]
  },
  sakit: {
    label: "Detail sakit",
    fields: [
      { id: "tanggalMulai", label: "Tanggal mulai", type: "date", required: true },
      { id: "tanggalSelesai", label: "Tanggal selesai", type: "date", required: true },
      { id: "keterangan", label: "Keterangan (opsional lampiran surat dokter)", type: "textarea", required: false }
    ]
  },
  // Jenis ini pakai sistem "Tukar Shift Petugas" yang sudah ada (sheet "TukarShift"),
  // ditampilkan dalam 3 kolom (kiri/tengah/kanan) supaya muat 1 layar di komputer.
  tukarshift: {
    label: "Detail tukar shift",
    isLegacy: true,
    columns: [
      {
        title: "Informasi umum",
        fields: [
          { id: "tahun", label: "Tahun", type: "text", required: true, placeholder: "contoh: 2026" },
          { id: "bulan", label: "Bulan", type: "select", required: true,
            options: ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"] },
          { id: "depo", label: "Depo", type: "select", required: true,
            options: ["GD.FARMASI","RANAP","FARM TERPADU","IGD","IBS","UPSS","CENDERAWASIH"] },
          { id: "tanggalGantiShift", label: "Tanggal ganti shift", type: "date", required: true }
        ]
      },
      {
        title: "Shift saya",
        fields: [
          { id: "shiftLama", label: "Shift lama", type: "select", required: true, options: ["P","TS","S","M","L"] },
          { id: "shiftBaru", label: "Shift baru", type: "select", required: true, options: ["P","TS","S","M","L"] }
        ]
      },
      {
        title: "Shift pengganti",
        fields: [
          { id: "nipRekan", label: "Nama staff pengganti", type: "name-lookup", required: true },
          { id: "shiftLamaP", label: "Shift lama pengganti", type: "select", required: true, options: ["P","TS","S","M","L"] },
          { id: "shiftBaruP", label: "Shift baru pengganti", type: "select", required: true, options: ["P","TS","S","M","L"] }
        ]
      }
    ]
  },
  cuti: {
    label: "Detail cuti tahunan",
    fields: [
      { id: "tanggalMulai", label: "Tanggal mulai", type: "date", required: true },
      { id: "tanggalSelesai", label: "Tanggal selesai", type: "date", required: true },
      { id: "keterangan", label: "Keterangan", type: "textarea", required: false }
    ]
  },
  telat: {
    label: "Detail telat / pulang cepat",
    fields: [
      { id: "tanggal", label: "Tanggal", type: "date", required: true },
      { id: "jenisTelat", label: "Jenis", type: "radio", options: [["telat","Telat"],["pulang_cepat","Pulang cepat"]], required: true },
      { id: "jam", label: "Jam", type: "time", required: true },
      { id: "keterangan", label: "Alasan", type: "textarea", required: true }
    ]
  },
  absensieror: {
    label: "Detail absensi eror",
    fields: [
      { id: "tanggalAbsensi", label: "Tanggal absensi", type: "date", required: true },
      { id: "waktuAbsensi", label: "Waktu absensi", type: "radio", options: [["masuk","Absen masuk"],["pulang","Absen pulang"]], required: true },
      { id: "keterangan", label: "Kendala tidak bisa absen", type: "textarea", required: true }
    ]
  }
};

let currentJenis = null;
let staffData = null;
let nipLookupCache = {}; // simpan hasil lookup NIP selain NIP utama, contoh: { nipRekan: {nip, nama, ...} }

// ==== PILIH JENIS FORMULIR ====
document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    currentJenis = chip.dataset.jenis;
    nipLookupCache = {};
    document.querySelector(".wrap").classList.toggle("wide", currentJenis === "tukarshift");
    renderDynamicFields(currentJenis);
  });
});

function buildFieldWrap(f){
  const wrap = document.createElement("div");
  wrap.className = "field";

  if (f.type === "textarea"){
    wrap.innerHTML = `
      <label for="${f.id}">${f.label}${f.required ? "" : ' <span class="opt">(opsional)</span>'}</label>
      <textarea id="${f.id}" name="${f.id}" ${f.required ? "required" : ""}></textarea>`;
  } else if (f.type === "radio"){
    wrap.innerHTML = `
      <label>${f.label}</label>
      <div class="radio-group">
        ${f.options.map((o,i) => `
          <label class="radio-opt">
            <input type="radio" name="${f.id}" value="${o[0]}" ${i===0 ? "checked" : ""}>
            ${o[1]}
          </label>`).join("")}
      </div>`;
  } else if (f.type === "name-lookup"){
    wrap.innerHTML = `
      <label for="${f.id}">${f.label}</label>
      <input type="text" id="${f.id}" name="${f.id}" list="staffOptions" placeholder="Ketik beberapa huruf nama..." autocomplete="off" required>
      <div class="staff-preview" id="${f.id}Preview"></div>`;
  } else if (f.type === "select"){
    wrap.innerHTML = `
      <label for="${f.id}">${f.label}${f.required ? "" : ' <span class="opt">(opsional)</span>'}</label>
      <select id="${f.id}" name="${f.id}" ${f.required ? "required" : ""}>
        <option value="" disabled selected>Pilih ${f.label.toLowerCase()}</option>
        ${f.options.map(o => `<option value="${o}">${o}</option>`).join("")}
      </select>`;
  } else {
    wrap.innerHTML = `
      <label for="${f.id}">${f.label}${f.required ? "" : ' <span class="opt">(opsional)</span>'}</label>
      <input type="${f.type}" id="${f.id}" name="${f.id}" ${f.required ? "required" : ""}>`;
  }
  return wrap;
}

function renderDynamicFields(jenis){
  const config = formConfigs[jenis];
  const card = document.getElementById("dynamicCard");
  const container = document.getElementById("dynamicFields");
  document.getElementById("dynamicLabel").textContent = config.label;
  document.getElementById("emptyCard").style.display = "none";
  card.style.display = "block";
  card.dataset.jenis = jenis;
  container.innerHTML = "";

  if (config.columns){
    // Layout 3 kolom (kiri/tengah/kanan) — dipakai untuk tukar shift
    const colGroup = document.createElement("div");
    colGroup.className = "col-group";

    config.columns.forEach(col => {
      const colEl = document.createElement("div");
      colEl.innerHTML = `<p class="col-title">${col.title}</p>`;
      col.fields.forEach(f => colEl.appendChild(buildFieldWrap(f)));
      colGroup.appendChild(colEl);
    });

    container.appendChild(colGroup);
  } else {
    // Layout satu kolom biasa — izin/sakit/cuti/telat/absensieror
    config.fields.forEach(f => container.appendChild(buildFieldWrap(f)));
  }

  container.querySelectorAll('input[list="staffOptions"]').forEach(input => {
    input.addEventListener("input", () => {
      const found = findStaffFromInputValue(input.value);
      const previewEl = document.getElementById(input.id + "Preview");
      if (found){
        nipLookupCache[input.id] = found;
        previewEl.innerHTML = `
          <div><strong>${found.nama}</strong></div>
          <div>${found.departemen || "-"} &middot; ${found.jabatan || "-"}</div>`;
        previewEl.className = "staff-preview show";
      } else {
        delete nipLookupCache[input.id];
        previewEl.className = "staff-preview";
      }
    });
  });
}

// ==== MUAT DAFTAR STAFF (sekali saat halaman dibuka) ====
let staffList = [];

async function loadStaffList(){
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=listStaff`);
    const data = await res.json();
    staffList = Array.isArray(data) ? data : [];

    const datalist = document.getElementById("staffOptions");
    datalist.innerHTML = staffList
      .map(s => `<option value="${s.nama} (${s.nip})">`)
      .join("");
  } catch (err){
    console.error("Gagal memuat daftar staff:", err);
  }
}
document.addEventListener("DOMContentLoaded", loadStaffList);

// Cocokkan teks input (format "Nama (NIP)") dengan data staff yang sudah dimuat
function findStaffFromInputValue(value){
  const match = value.match(/\(([^)]+)\)\s*$/);
  const nip = match ? match[1].trim() : null;
  if (!nip) return null;
  return staffList.find(s => s.nip === nip) || null;
}

// ==== AUTOFILL IDENTITAS UTAMA ====
document.getElementById("staffSearch").addEventListener("input", () => {
  const previewEl = document.getElementById("staffPreview");
  const found = findStaffFromInputValue(document.getElementById("staffSearch").value);

  if (found){
    staffData = found;
    previewEl.innerHTML = `
      <div><strong>${found.nama}</strong></div>
      <div>${found.departemen || "-"} &middot; ${found.jabatan || "-"}</div>`;
    previewEl.className = "staff-preview show";
  } else {
    staffData = null;
    previewEl.className = "staff-preview";
  }
});

// ==== SUBMIT FORM ====
document.getElementById("mainForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const banner = document.getElementById("banner");
  banner.className = "banner";

  if (!currentJenis){
    banner.textContent = "Pilih jenis formulir terlebih dahulu.";
    banner.classList.add("banner","error","show");
    return;
  }
  if (!staffData){
    banner.textContent = "Data staff belum ditemukan. Cari dan pilih nama terlebih dahulu.";
    banner.classList.add("banner","error","show");
    return;
  }

  const formData = new FormData(e.target);
  let payload;

  if (currentJenis === "tukarshift"){
    const rekan = nipLookupCache["nipRekan"];
    if (!rekan){
      banner.textContent = "Cari dan pilih nama staff pengganti terlebih dahulu.";
      banner.classList.add("banner","error","show");
      return;
    }
    // Payload ini sengaja TANPA field "jenis" — router Code.gs akan
    // mengarahkannya ke sistem Tukar Shift Petugas yang sudah ada (sheet "Tukar Shift").
    payload = {
      action: "add",
      record: {
        "Submission ID": "TS-" + Date.now(),
        "Respondent ID": staffData.nip,
        "Submitted at": new Date().toISOString(),
        "Tahun": formData.get("tahun") || "",
        "Bulan": formData.get("bulan") || "",
        "Depo": formData.get("depo") || "",
        "Tanggal ganti shift": formData.get("tanggalGantiShift") || "",
        "Nama staff yang tukar shiff": staffData.nama,
        "Shift Lama": formData.get("shiftLama") || "",
        "Shift Baru": formData.get("shiftBaru") || "",
        "Nama Staff pengganti": rekan.nama,
        "Shiff lama (P)": formData.get("shiftLamaP") || "",
        "Shiff baru(P)": formData.get("shiftBaruP") || ""
      }
    };
  } else {
    payload = { jenis: currentJenis, nip: staffData.nip };
    formData.forEach((value, key) => { payload[key] = value; });
  }

  const submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled = true;
  submitBtn.textContent = "Mengirim...";

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });

    banner.textContent = "Pengajuan berhasil dikirim.";
    banner.classList.add("banner","success","show");
    e.target.reset();
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    document.getElementById("dynamicCard").style.display = "none";
    document.querySelector(".wrap").classList.remove("wide");
    document.getElementById("staffPreview").className = "staff-preview";
    currentJenis = null;
    staffData = null;
    nipLookupCache = {};
  } catch (err){
    banner.textContent = "Gagal mengirim pengajuan. Periksa koneksi dan coba lagi.";
    banner.classList.add("banner","error","show");
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Kirim pengajuan";
  }
});
</script>
</body>
</html>
